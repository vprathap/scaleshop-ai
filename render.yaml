services:
  # ── Backend API (Node.js) ────────────────────────────────────
  - type: web
    name: scaleshop-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: scaleshop-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://scaleshop-ui.onrender.com

  # ── Frontend Static Site ─────────────────────────────────────
  - type: web
    name: scaleshop-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://scaleshop-api.onrender.com

# ── PostgreSQL Database ───────────────────────────────────────
databases:
  - name: scaleshop-db
    databaseName: scaleshop
    user: scaleshop_user
    plan: free
