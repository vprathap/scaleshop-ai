version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: scaleshop_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: scaleshop
      POSTGRES_USER: scaleshop_user
      POSTGRES_PASSWORD: scaleshop_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql

  backend:
    build: ./backend
    container_name: scaleshop_api
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://scaleshop_user:scaleshop_pass@postgres:5432/scaleshop
      JWT_SECRET: change_this_to_a_long_random_secret_in_production
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:5173
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: scaleshop_ui
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
